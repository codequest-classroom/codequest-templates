<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coding Quest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="student-name">Loading...</h1>
            <div class="stats">
                <div class="stat">⭐ XP: <span id="xp">—</span></div>
                <div class="stat">🏆 Badges: <span id="badges">—</span></div>
                <button id="refresh-btn" onclick="loadStudentProgress(true)">🔄 Refresh</button>
            </div>
        </header>

        <div id="skill-tree" class="skill-tree">
            <!-- Circle tree will be built here -->
        </div>

        <footer>
            <p>🚀 Every circle you complete = new powers! 🌟</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
