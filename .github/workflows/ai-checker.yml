name: CodeQuest AI Checker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install requests

      - name: 🤖 Run AI Review
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python review.py

      - name: 💾 Commit feedback and progress
        run: |
          git config user.name "CodeQuest Bot"
          git config user.email "bot@codequest.dev"
          git add feedback.md identity.json
          git diff --staged --quiet || (git commit -m "🤖 Auto-update: feedback + progress" && git push)

      - name: 📊 Show result
        run: |
          if [ -f feedback.md ]; then
            echo "✅ Feedback generated successfully!"
            echo "📝 First 5 lines of feedback:"
            head -5 feedback.md
          else
            echo "❌ No feedback generated"
          fi

      - name: 🎯 Mission Status
        run: |
          if [ -f identity.json ]; then
            XP=$(grep -o '"xp": [0-9]*' identity.json | cut -d' ' -f2)
            echo "✅ Current XP: $XP"
          fi
